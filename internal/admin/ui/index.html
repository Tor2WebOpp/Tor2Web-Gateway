<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="referrer" content="no-referrer">
<title data-i18n="app.title">Gateway Admin</title>
<link rel="icon" href="static/img/logo.svg" type="image/svg+xml">
<link rel="stylesheet" href="static/css/tokens.css">
<link rel="stylesheet" href="static/css/theme-dark.css">
<link rel="stylesheet" href="static/css/theme-light.css">
<link rel="stylesheet" href="static/css/layout.css">
<link rel="stylesheet" href="static/css/components.css">
</head>
<body>
<noscript><p class="noscript-warn" data-i18n="app.noscript">Admin ready. JavaScript is required for the full interface.</p></noscript>
<div id="boot" class="boot-screen">
  <div class="boot-inner">
    <img src="static/img/logo.svg" alt="" class="boot-logo" aria-hidden="true">
    <p class="boot-title" data-i18n="app.loading">Admin ready. Loading...</p>
  </div>
</div>
<aside id="sidebar" class="sidebar" aria-label="primary" hidden>
  <div class="brand">
    <img src="static/img/logo.svg" alt="" aria-hidden="true" class="brand-logo">
    <span class="brand-text" data-i18n="app.title">Gateway Admin</span>
  </div>
  <nav class="nav" aria-label="primary-nav">
    <a href="#/dashboard"    class="nav-link" data-route="dashboard"    data-i18n="nav.dashboard">Dashboard</a>
    <a href="#/tenants"      class="nav-link" data-route="tenants"      data-i18n="nav.tenants">Tenants</a>
    <a href="#/mirrors"      class="nav-link" data-route="mirrors"      data-i18n="nav.mirrors">Mirrors</a>
    <a href="#/blocklist"    class="nav-link" data-route="blocklist"    data-i18n="nav.blocklist">Blocklist</a>
    <a href="#/features"     class="nav-link" data-route="features"     data-i18n="nav.features">Features</a>
    <a href="#/nodes"        class="nav-link" data-route="nodes"        data-i18n="nav.nodes">Nodes</a>
    <a href="#/metrics"      class="nav-link" data-route="metrics"      data-i18n="nav.metrics">Metrics</a>
    <a href="#/audit"        class="nav-link" data-route="audit"        data-i18n="nav.audit">Audit</a>
    <a href="#/auto-domains" class="nav-link" data-route="auto-domains" data-i18n="nav.autoDomains">Auto Domains</a>
  </nav>
</aside>
<main id="main" class="main" hidden>
  <header class="topbar">
    <button class="icon-btn" id="sidebar-toggle" aria-label="toggle-nav" data-i18n-aria="action.toggleNav"><span class="burger" aria-hidden="true"></span></button>
    <span class="node-id" id="node-id" title="node-id"></span>
    <span class="spacer"></span>
    <button class="icon-btn" id="theme-toggle" aria-label="toggle-theme" data-i18n-aria="action.toggleTheme"><span id="theme-icon" class="theme-icon" aria-hidden="true"></span></button>
    <button class="btn btn-ghost" id="logout-btn" data-i18n="action.logout">Logout</button>
  </header>
  <section id="content" class="content" aria-live="polite"></section>
</main>
<div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>
<div id="modal-root" class="modal-root" aria-live="polite"></div>
<script type="module" src="static/js/app.js"></script>
</body>
</html>
