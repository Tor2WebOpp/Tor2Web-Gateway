# Gateway configuration example (P1 schema).
#
# This file describes the bootstrap config read once on process start.
# Tenant definitions and feature toggles are runtime config owned by the
# hub and are documented separately in docs/tenants.md and docs/features.md.
#
# Copy this file to config.yaml and fill in real values.
# Do NOT commit config.yaml to version control. Secrets referenced here
# (keys, mTLS, node-secret) live in separate files with mode 0600.

# --------------------------------------------------------------------------
# Mode and role
# --------------------------------------------------------------------------

# Deployment mode:
#   local  — everything on one machine (gateway-proxy + gateway-torpool).
#            No hub. No multi-node. Backward-compatible single-box operator.
#   remote — edge proxies connect to a central gateway-hub which owns the
#            Tor pool, the tenant registry, and the mTLS CA.
mode: remote

# Node role. Determines which binary reads this file.
#   proxy — edge; serves public traffic, forwards upstream to the hub.
#   hub   — central controller; runs torpool + tenant registry + admin API.
#   local — single-box combined role (only valid when mode = local).
#   door  — P2 redirector; serves a cover page and 302s on known slugs.
node_type: proxy

# Unique identifier for this node. Set by the installer. Used as the CN in
# the mTLS client certificate and in hub logs.
node_id: "edge-REPLACE-ME"

# Path to a 32-byte hex file generated by the installer. Identifies this
# node to the hub when mTLS is not yet in place (bootstrap registration).
node_secret_file: /etc/gateway/node-secret

# --------------------------------------------------------------------------
# Public listeners (proxy and local modes only; hub does not listen here)
# --------------------------------------------------------------------------

listen:
  http: ":80"       # ACME HTTP-01 challenges and HTTP-to-HTTPS redirect.
  https: ":443"     # TLS listener. Certificate is issued by CertMagic.

# --------------------------------------------------------------------------
# Transport to the hub (remote mode only; ignored when mode = local)
# --------------------------------------------------------------------------

# The transport carries two things: SOCKS5 traffic to the hub's Tor pool,
# and HTTP calls to the hub admin/config API. Transport is infrastructure;
# changing it requires restarting the edge. Runtime switching is out of scope.
#
# Options:
#   wireguard    — UDP overlay. Default and recommended. Hub binds SOCKS and
#                  admin on 10.0.0.1 only; edges dial via the wg tunnel.
#   https_tunnel — WebSocket over HTTPS with mTLS. Used when UDP is blocked
#                  or the edge sits behind NAT that does not allow UDP.
#                  Slower than wireguard because of userspace framing.
#   socks5_tls   — Raw SOCKS5 inside TLS, with a separate admin HTTPS port.
#                  Last resort: exposes fingerprint-able ports.
transport:
  kind: wireguard

  wireguard:
    interface: wg0
    private_key_file: /etc/gateway/wg-private.key
    peer_pubkey: "REPLACE-WITH-HUB-WG-PUBKEY"
    peer_endpoint: "hub.your-domain.example:51820"
    peer_allowed_ips: "10.0.0.1/32"
    self_ip: "10.0.0.42/24"

  https_tunnel:
    # Full URL of the hub's WebSocket endpoint.
    hub_url: "https://hub.your-domain.example:8443"
    # CA bundle used to verify the hub's TLS certificate.
    ca_cert_file: /etc/gateway/hub-ca.pem

  socks5_tls:
    hub_addr: "hub.your-domain.example:9443"
    admin_addr: "hub.your-domain.example:9444"
    ca_cert_file: /etc/gateway/hub-ca.pem

# mTLS identity. Required when node_type = proxy or hub in remote mode.
# In local mode this block is ignored.
mtls:
  client_cert_file: /etc/gateway/client.crt
  client_key_file: /etc/gateway/client.key

# URL that the edge uses to reach the hub's admin/config API. When transport
# is wireguard, this is the private 10.0.0.1 address. For https_tunnel and
# socks5_tls it is derived from transport config; leave empty to auto-derive.
hub_url: "http://10.0.0.1:9080"

# --------------------------------------------------------------------------
# Hub-specific block (only read when node_type = hub)
# --------------------------------------------------------------------------

hub:
  # Admin API bind address. For wireguard, bind to the private hub IP only.
  listen_admin: "10.0.0.1:9080"

  # WireGuard server listener (only used when transport.kind = wireguard).
  listen_wg: ":51820"

  # mTLS CA. Hub signs edge client certificates with this root.
  mtls_ca:
    cert_file: /etc/gateway/hub-ca.pem
    key_file: /etc/gateway/hub-ca.key

  # Persistent data: tenant yaml files, bolt DB for abuse reports and the
  # ttl_blocklist, CRL, signed edge certificates, stealth-auth keys.
  data_dir: /var/lib/gateway/hub

# --------------------------------------------------------------------------
# Tor pool (hub-side in remote mode; local-side in local mode)
# --------------------------------------------------------------------------

torpool:
  binary: tor
  socks_base_port: 9050       # First SOCKS5 port. Subsequent instances: +1, +2...
  # Tor hidden-service reachability is known to be uneven: open measurements
  # report that ~30% of onions are unreachable at any moment and roughly half
  # of the reachable ones experience 30-60s stalls during circuit refresh.
  # A pool of ten keeps 7-8 instances serving even on a bad day and leaves
  # headroom for a cascade without draining to one survivor.
  min_instances: 10
  max_instances: 20
  data_dir: /var/lib/gateway/tor
  # Cold-start Tor on a fresh data dir sometimes needs longer than 60s,
  # especially when the consensus is being fetched on a slow network.
  bootstrap_timeout: "90s"

# HTTP connection pool and circuit management (proxy and local).
pool:
  max_idle_conns_per_host: 10
  idle_timeout: "90s"
  response_timeout: "30s"
  connect_timeout: "10s"
  retry_attempts: 3
  # Three consecutive failures with 60s between checks gives each instance
  # three minutes to recover from a transient stall before it is replaced.
  # Tighter intervals (e.g. 30s) triggered false replacements during the
  # known 30-60s intro-point-refresh windows in the real network.
  health_check_interval: "60s"
  rebalance_interval: "15s"
  scale_cooldown: "120s"
  scale_up_threshold: 0.80
  scale_down_threshold: 0.20

  # When a Tor instance crosses the failure threshold it is quarantined:
  # pulled out of the load-balancer (Alive=false) but not killed. Probes
  # continue; the next success clears the quarantine and restores traffic
  # without a bootstrap. Only instances that fail to recover within this
  # grace period are replaced with a fresh Tor process.
  quarantine_grace: "5m"

# --------------------------------------------------------------------------
# Admin gate (hidden path carve-out; P3 ships the real handler)
# --------------------------------------------------------------------------

# The admin path is three opaque random strings chained into a URL prefix:
#   https://<public-host>/<slug>/<token1>/<token2>/...
# Constant-time comparison on the tokens means timing reveals nothing about
# whether or which segment matched. The URL itself is the credential — there
# is no login form. See docs/admin.md and docs/audit.md for the full model.
admin:
  enabled: true

  # 32-character random strings generated by the installer. Replace before
  # any deploy. Do not log these values anywhere.
  slug: "EXAMPLE-SLUG"
  token1: "EXAMPLE-TOKEN-A"
  token2: "EXAMPLE-TOKEN-B"

  # P3 admin handler tunables. All values below are loaded unconditionally
  # but only consulted when admin.enabled is true. Defaults are filled in
  # by config.fillDefaults so a minimal admin block (slug + tokens) keeps
  # working — the values here are explicit copies of the defaults.

  # Idle window before the gw_adm session cookie is treated as stale and
  # the operator is bounced back through the URL gate. Default 15m.
  session_idle_ttl: "15m"

  # Maximum lifetime of a single session regardless of activity. Hard cap
  # so a stolen cookie cannot live forever. Must be greater than
  # session_idle_ttl. Default 8h.
  session_absolute_ttl: "8h"

  # Append-only audit log directory. Per-day JSONL files plus a BoltDB
  # index live under <audit_data_dir>/audit/. Defaults to a per-node-type
  # path under /var/lib/gateway/<role>/audit so multiple binaries on the
  # same host do not clobber each other's history.
  audit_data_dir: "/var/lib/gateway/proxy/audit"

  # Per-IP-hash failed-attempt tracker. Soft tier flips an offending IP
  # into a brief 404-only state; hard tier escalates to a longer ban.
  # Any successful entry from the same IP resets both tiers immediately.
  lockout:
    soft_threshold: 3        # failures inside soft_window
    soft_window: "60s"       # sliding window for the soft tier
    soft_backoff: "30s"      # 404-only duration after soft threshold trip
    hard_threshold: 10       # failures inside hard_window
    hard_window: "10m"       # sliding window for the hard tier
    hard_ban: "1h"           # 404-only duration after hard threshold trip

# --------------------------------------------------------------------------
# Metrics
# --------------------------------------------------------------------------

metrics:
  enabled: true

  # Bind only to private addresses. Never expose /metrics to the internet.
  # Typical values: ":9090" on the wg interface, or "127.0.0.1:9090".
  listen: "10.0.0.42:9090"

  # OPSEC controls that change what ends up in metric labels.
  opsec:
    # When true, tenant labels are sha256(host + salt) truncated. Operators
    # who need raw host names read them from the hub admin API, not from
    # /metrics. Default is true; set to false only for internal debugging.
    hash_tenant_labels: true

    # Per-install salt for the hash above. Installer generates this; keep
    # it stable or all historical labels become unrelatable.
    tenant_label_salt_file: /etc/gateway/metrics-salt

  # OpenTelemetry tracing exporter. See docs/tracing.md.
  tracing:
    enabled: false
    endpoint: "otel-collector.internal:4317"
    sample_ratio: 0.05

# --------------------------------------------------------------------------
# Logging
# --------------------------------------------------------------------------

logging:
  level: info             # debug | info | warn | error
  format: json            # json | text
  output: stdout          # stdout | /var/log/gateway/proxy.log
  anonymize_ips: true     # Zeroes last octet of IPv4, /64 for IPv6.
  max_size_mb: 100        # Only applied when output is a file path.
  max_backups: 5

# --------------------------------------------------------------------------
# Feature defaults (bootstrap-level)
# --------------------------------------------------------------------------

# Most feature configuration lives in the hub runtime config (see
# docs/features.md and docs/tenants.md). The bootstrap file only exposes
# flags that cannot be changed without a restart: paths to static files
# and processes that must exist before the registry loads.

features:
  geoip:
    # MaxMind GeoLite2-Country database path. Required only if geoip is
    # enabled on any tenant. Omitted or missing -> feature disabled globally.
    db_path: "/var/lib/gateway/geoip/GeoLite2-Country.mmdb"

  ttl_blocklist:
    # BoltDB file for persistent blocklist entries with TTL.
    db_path: "/var/lib/gateway/ttlblock.db"

  abuse_api:
    # BoltDB file for received abuse reports.
    db_path: "/var/lib/gateway/abuse.db"

  static_cache:
    max_size_mb: 256
    default_ttl: "5m"

# --------------------------------------------------------------------------
# Door role (read only when node_type = door)
# --------------------------------------------------------------------------
#
# A door is a disposable redirector. It serves a cover page on '/' and
# emits HTTP 302 on a short list of opaque slug paths to one of the
# currently-healthy mirror hostnames. Door runtime (cover, slugs) is owned
# by the hub and streamed to the door through /v1/config/stream; the block
# below only carries bootstrap settings that cannot be safely hot-reloaded.
#
# See docs/door.md for the full description and docs/mirrors.md for the
# mirror-health model that doors consume.

# door:
#   # Cover asset is copied into place by the installer. The path below is
#   # the on-disk location the door reads at configure time. If the hub
#   # pushes a new cover kind (static_html, passthrough_404), this path is
#   # ignored. Leave the default unless the installer set a different one.
#   cover_asset_dir: /etc/gateway/cover
#
#   # If the hub becomes unreachable for longer than stale_cutoff, the door
#   # marks its cached mirror list stale and returns 503 on slug requests.
#   # Cover responses continue to work. Default 30m.
#   stale_cutoff: "30m"
#
#   # Debug-only: log the chosen mirror per redirect. Off in production.
#   # Never enable on a machine that sees probing traffic.
#   log_redirect_targets: false

# --------------------------------------------------------------------------
# Cloudflare integration (optional; proxy and local modes)
# --------------------------------------------------------------------------

cloudflare:
  enabled: false
  mode: "full_strict"   # full_strict | flexible

# --------------------------------------------------------------------------
# Backward-compat: legacy single-pool single-tenant config (pre-P1)
# --------------------------------------------------------------------------
